name: Carousel Generator + Notion

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Carousel topic'
        required: true
      platform:
        description: 'Platform'
        required: false
        default: 'both'
        type: choice
        options: [both, instagram, linkedin]
      slides:
        description: 'Slide count'
        required: false
        default: '7'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r Scripts/carousel/requirements.txt

      - name: Generate carousel + upload to Notion
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY:       ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID:   ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          cd Scripts/carousel
          python main.py \
            --topic "${{ inputs.topic }}" \
            --platform "${{ inputs.platform }}" \
            --slides ${{ inputs.slides }}

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Scripts/carousel/output/
          git diff --staged --quiet || git commit -m "chore: carousel $(date -u +'%Y-%m-%d')"
          git push
