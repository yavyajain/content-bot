name: Weekly LinkedIn Visuals

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8 AM UTC
  workflow_dispatch:
    inputs:
      topic:
        description: 'Custom topic (leave blank for auto-rotation)'
        required: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r Scripts/linkedin_visuals/requirements.txt

      - name: Generate diagrams
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd Scripts/linkedin_visuals
          if [ -n "${{ inputs.topic }}" ]; then
            python generator.py --topic "${{ inputs.topic }}"
          else
            python generator.py --count 2
          fi

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f Scripts/linkedin_visuals/output/ Scripts/linkedin_visuals/topics.json
          git diff --staged --quiet || git commit -m "chore: linkedin visuals $(date -u +'%Y-%m-%d')"
          git push
